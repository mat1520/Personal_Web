<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg-md" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card-md" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg-md)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="30" fill="#00d4ff" opacity="0.1"/>
  <circle cx="520" cy="280" r="40" fill="#00d4ff" opacity="0.08"/>
  
  <!-- Credit Card -->
  <g transform="translate(180, 75)">
    <!-- Card body -->
    <rect x="0" y="0" width="240" height="150" rx="12" fill="url(#card-md)" filter="drop-shadow(0 8px 20px rgba(0, 0, 0, 0.3))"/>
    
    <!-- Card shine -->
    <rect x="0" y="0" width="240" height="60" rx="12" fill="#fff" opacity="0.1"/>
    
    <!-- Chip -->
    <rect x="15" y="90" width="38" height="38" rx="3" fill="#ffd700" opacity="0.9"/>
    <rect x="19" y="94" width="30" height="30" rx="2" fill="#f0c000"/>
    <circle cx="27" cy="102" r="2.2" fill="#1a472a"/>
    <circle cx="34" cy="102" r="2.2" fill="#1a472a"/>
    <circle cx="41" cy="102" r="2.2" fill="#1a472a"/>
    <circle cx="27" cy="117" r="2.2" fill="#1a472a"/>
    <circle cx="34" cy="117" r="2.2" fill="#1a472a"/>
    <circle cx="41" cy="117" r="2.2" fill="#1a472a"/>
    
    <!-- Card number -->
    <text x="15" y="139" fill="#fff" font-family="monospace" font-size="18" letter-spacing="1.5">•••• •••• •••• 3847</text>
  </g>
  
  <!-- Shield with checkmark -->
  <g transform="translate(340, 90)">
    <!-- Shield -->
    <path d="M 0 0 L 60 0 L 60 38 Q 60 75 30 90 Q 0 75 0 38 Z" fill="#fff" opacity="0.95" filter="drop-shadow(0 5px 15px rgba(0, 0, 0, 0.2))"/>
    
    <!-- Shield border -->
    <path d="M 0 0 L 60 0 L 60 38 Q 60 75 30 90 Q 0 75 0 38 Z" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    
    <!-- Checkmark -->
    <path d="M 15 42 L 27 53 L 48 30" stroke="#00d4ff" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Description text -->
  <text x="300" y="290" fill="#fff" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold">Card Validator Bot</text>
  <text x="300" y="312" fill="#00d4ff" font-family="monospace" font-size="11" text-anchor="middle">Luhn Algorithm • Secure</text>
</svg>
