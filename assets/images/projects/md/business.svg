<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="biz-bg-md" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biz-chart-md" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="340" fill="url(#biz-bg-md)"/>
  
  <!-- Decorative circles -->
  <circle cx="75" cy="80" r="38" fill="#3b82f6" opacity="0.08"/>
  <circle cx="525" cy="260" r="45" fill="#3b82f6" opacity="0.06"/>
  
  <!-- Dashboard panel -->
  <rect x="80" y="50" width="440" height="240" rx="12" fill="#1e293b" filter="drop-shadow(0 8px 30px rgba(0, 0, 0, 0.5))"/>
  <rect x="80" y="50" width="440" height="240" rx="12" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Header bar -->
  <rect x="80" y="50" width="440" height="30" rx="12" fill="#0f172a"/>
  <circle cx="95" cy="65" r="3.5" fill="#ef4444"/>
  <circle cx="110" cy="65" r="3.5" fill="#eab308"/>
  <circle cx="125" cy="65" r="3.5" fill="#10b981"/>
  
  <!-- Chart bars -->
  <g transform="translate(100, 200)">
    <!-- Bar 1 -->
    <rect x="0" y="15" width="18" height="30" rx="3" fill="url(#biz-chart-md)" opacity="0.7"/>
    <!-- Bar 2 -->
    <rect x="25" y="7" width="18" height="38" rx="3" fill="url(#biz-chart-md)" opacity="0.85"/>
    <!-- Bar 3 -->
    <rect x="50" y="0" width="18" height="45" rx="3" fill="url(#biz-chart-md)" opacity="1"/>
    <!-- Bar 4 -->
    <rect x="75" y="4" width="18" height="41" rx="3" fill="url(#biz-chart-md)" opacity="0.9"/>
    <!-- Grid line -->
    <line x1="-8" y1="45" x2="110" y2="45" stroke="#334155" stroke-width="0.8" opacity="0.3"/>
  </g>
  
  <!-- Info boxes -->
  <g transform="translate(250, 100)">
    <!-- Box 1: Users -->
    <rect x="0" y="0" width="65" height="53" rx="6" fill="#1e40af" opacity="0.6"/>
    <text x="32.5" y="22" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">2.4K</text>
    <text x="32.5" y="40" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Usuarios</text>
    
    <!-- Box 2: Revenue -->
    <rect x="75" y="0" width="65" height="53" rx="6" fill="#1e40af" opacity="0.6"/>
    <text x="107.5" y="22" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">$48K</text>
    <text x="107.5" y="40" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Ingresos</text>
  </g>
  
  <!-- Text -->
  <text x="300" y="310" fill="#fff" font-family="Arial, sans-serif" font-size="17" text-anchor="middle" font-weight="bold">Business Manager SaaS</text>
  <text x="300" y="328" fill="#3b82f6" font-family="monospace" font-size="10" text-anchor="middle">Go • Gin • PostgreSQL</text>
</svg>
