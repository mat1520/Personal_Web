<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="bg-sm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card-sm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg-sm)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="40" r="20" fill="#00d4ff" opacity="0.1"/>
  <circle cx="350" cy="190" r="28" fill="#00d4ff" opacity="0.08"/>
  
  <!-- Credit Card -->
  <g transform="translate(100, 50)">
    <!-- Card body -->
    <rect x="0" y="0" width="160" height="100" rx="8" fill="url(#card-sm)" filter="drop-shadow(0 5px 12px rgba(0, 0, 0, 0.3))"/>
    
    <!-- Card shine -->
    <rect x="0" y="0" width="160" height="40" rx="8" fill="#fff" opacity="0.1"/>
    
    <!-- Chip -->
    <rect x="10" y="60" width="25" height="25" rx="2" fill="#ffd700" opacity="0.9"/>
    <rect x="13" y="63" width="19" height="19" rx="1.5" fill="#f0c000"/>
    <circle cx="19" cy="69" r="1.5" fill="#1a472a"/>
    <circle cx="25" cy="69" r="1.5" fill="#1a472a"/>
    <circle cx="31" cy="69" r="1.5" fill="#1a472a"/>
    <circle cx="19" cy="78" r="1.5" fill="#1a472a"/>
    <circle cx="25" cy="78" r="1.5" fill="#1a472a"/>
    <circle cx="31" cy="78" r="1.5" fill="#1a472a"/>
    
    <!-- Card number -->
    <text x="10" y="93" fill="#fff" font-family="monospace" font-size="12" letter-spacing="1">•••• •••• •••• 3847</text>
  </g>
  
  <!-- Shield with checkmark -->
  <g transform="translate(240, 60)">
    <!-- Shield -->
    <path d="M 0 0 L 40 0 L 40 25 Q 40 50 20 60 Q 0 50 0 25 Z" fill="#fff" opacity="0.95" filter="drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2))"/>
    
    <!-- Shield border -->
    <path d="M 0 0 L 40 0 L 40 25 Q 40 50 20 60 Q 0 50 0 25 Z" fill="none" stroke="#00d4ff" stroke-width="1.8"/>
    
    <!-- Checkmark -->
    <path d="M 10 28 L 18 35 L 32 20" stroke="#00d4ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Description text -->
  <text x="200" y="190" fill="#fff" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="bold">Card Validator</text>
  <text x="200" y="208" fill="#00d4ff" font-family="monospace" font-size="8" text-anchor="middle">Secure • Educational</text>
</svg>
