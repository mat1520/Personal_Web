<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <defs>
    <linearGradient id="biz-bg-sm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biz-chart-sm" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#biz-bg-sm)"/>
  
  <!-- Decorative circles -->
  <circle cx="45" cy="50" r="28" fill="#3b82f6" opacity="0.08"/>
  <circle cx="350" cy="170" r="32" fill="#3b82f6" opacity="0.06"/>
  
  <!-- Dashboard panel -->
  <rect x="60" y="35" width="280" height="160" rx="8" fill="#1e293b" filter="drop-shadow(0 6px 20px rgba(0, 0, 0, 0.5))"/>
  <rect x="60" y="35" width="280" height="160" rx="8" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
  
  <!-- Header bar -->
  <rect x="60" y="35" width="280" height="20" rx="8" fill="#0f172a"/>
  <circle cx="72" cy="45" r="2.5" fill="#ef4444"/>
  <circle cx="84" cy="45" r="2.5" fill="#eab308"/>
  <circle cx="96" cy="45" r="2.5" fill="#10b981"/>
  
  <!-- Chart bars -->
  <g transform="translate(75, 130)">
    <rect x="0" y="10" width="12" height="20" rx="2" fill="url(#biz-chart-sm)" opacity="0.7"/>
    <rect x="16" y="5" width="12" height="25" rx="2" fill="url(#biz-chart-sm)" opacity="0.85"/>
    <rect x="32" y="0" width="12" height="30" rx="2" fill="url(#biz-chart-sm)" opacity="1"/>
    <rect x="48" y="3" width="12" height="27" rx="2" fill="url(#biz-chart-sm)" opacity="0.9"/>
  </g>
  
  <!-- Info boxes -->
  <g transform="translate(170, 65)">
    <rect x="0" y="0" width="45" height="35" rx="4" fill="#1e40af" opacity="0.6"/>
    <text x="22.5" y="17" fill="#60a5fa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">2.4K</text>
    
    <rect x="50" y="0" width="45" height="35" rx="4" fill="#1e40af" opacity="0.6"/>
    <text x="72.5" y="17" fill="#60a5fa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">$48K</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="210" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Business Manager</text>
  <text x="200" y="223" fill="#3b82f6" font-family="monospace" font-size="8" text-anchor="middle">Go • PostgreSQL</text>
</svg>
