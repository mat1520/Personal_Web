<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2481cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- Large Telegram logo circle -->
  <circle cx="400" cy="200" r="120" fill="#fff" opacity="0.95"/>
  <circle cx="400" cy="200" r="100" fill="#0088cc"/>
  
  <!-- Paper plane icon -->
  <path d="M350 175 l80 25 l-25 50 l-30 -15 l-10 -25 z" fill="#fff"/>
  <path d="M360 180 l50 15 l-15 30 l-20 -10 l-5 -15 z" fill="#0088cc" opacity="0.3"/>
  
  <!-- Decorative elements -->
  <circle cx="250" cy="120" r="8" fill="#fff" opacity="0.7"/>
  <circle cx="550" cy="130" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="280" r="10" fill="#fff" opacity="0.6"/>
  <circle cx="600" cy="290" r="7" fill="#fff" opacity="0.4"/>
  
  <!-- Bot badge -->
  <rect x="320" y="340" width="160" height="35" rx="17" fill="#fff" opacity="0.9"/>
  <text x="400" y="362" fill="#0088cc" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">🤖 CC Checker Bot</text>
  
  <!-- Title -->
  <text x="400" y="410" fill="#fff" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" font-weight="bold">Telegram Bot CC Checker</text>
  <text x="400" y="435" fill="#b3d9ff" font-family="monospace" font-size="14" text-anchor="middle">PHP • Telegram API • Educational Tool</text>
</svg>
