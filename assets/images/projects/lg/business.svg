<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="biz-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biz-chart" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#biz-bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="50" fill="#3b82f6" opacity="0.08"/>
  <circle cx="700" cy="350" r="60" fill="#3b82f6" opacity="0.06"/>
  
  <!-- Dashboard panel -->
  <rect x="100" y="60" width="600" height="320" rx="16" fill="#1e293b" filter="drop-shadow(0 10px 40px rgba(0, 0, 0, 0.5))"/>
  <rect x="100" y="60" width="600" height="320" rx="16" fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>
  
  <!-- Header bar -->
  <rect x="100" y="60" width="600" height="40" rx="16" fill="#0f172a"/>
  <circle cx="120" cy="80" r="5" fill="#ef4444"/>
  <circle cx="140" cy="80" r="5" fill="#eab308"/>
  <circle cx="160" cy="80" r="5" fill="#10b981"/>
  
  <!-- Chart bars (ascending) -->
  <g transform="translate(130, 280)">
    <!-- Bar 1 -->
    <rect x="0" y="20" width="25" height="40" rx="4" fill="url(#biz-chart)" opacity="0.7"/>
    <!-- Bar 2 -->
    <rect x="35" y="10" width="25" height="50" rx="4" fill="url(#biz-chart)" opacity="0.85"/>
    <!-- Bar 3 -->
    <rect x="70" y="0" width="25" height="60" rx="4" fill="url(#biz-chart)" opacity="1"/>
    <!-- Bar 4 -->
    <rect x="105" y="5" width="25" height="55" rx="4" fill="url(#biz-chart)" opacity="0.9"/>
    <!-- Grid lines -->
    <line x1="-10" y1="60" x2="150" y2="60" stroke="#334155" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Info boxes -->
  <g transform="translate(350, 150)">
    <!-- Box 1: Users -->
    <rect x="0" y="0" width="85" height="70" rx="8" fill="#1e40af" opacity="0.6"/>
    <text x="42" y="25" fill="#60a5fa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" font-weight="bold">2.4K</text>
    <text x="42" y="48" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Usuarios</text>
    
    <!-- Box 2: Revenue -->
    <rect x="100" y="0" width="85" height="70" rx="8" fill="#1e40af" opacity="0.6"/>
    <text x="142" y="25" fill="#60a5fa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" font-weight="bold">$48K</text>
    <text x="142" y="48" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Ingresos</text>
  </g>
  
  <!-- Description text -->
  <text x="400" y="405" fill="#fff" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Business Manager SaaS</text>
  <text x="400" y="430" fill="#3b82f6" font-family="monospace" font-size="14" text-anchor="middle">Go • Gin Framework • PostgreSQL</text>
</svg>
